<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="goTop" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M12 19V5M5 12l7-7 7 7" />
      </svg>
    </div>

    <!-- NAVBAR -->
    <nav id="nav">
      <div
        class="nav-logo"
        onclick="window.location.href = '#hero'"
        onmouseover="window.cursor.classList.add('hover')"
        onmouseout="window.cursor.classList.remove('hover')"
      >
        Benjamin<span> C.</span>
      </div>
      <ul class="nav-links">
        <li>
          <a
            href="#about"
            data-i18n="nav.about"
            onmouseover="window.cursor.classList.add('hover')"
            onmouseout="window.cursor.classList.remove('hover')"
          ></a>
        </li>
        <li>
          <a
            href="#skills"
            data-i18n="nav.skills"
            onmouseover="window.cursor.classList.add('hover')"
            onmouseout="window.cursor.classList.remove('hover')"
          ></a>
        </li>
        <li>
          <a
            href="#projects"
            data-i18n="nav.projects"
            onmouseover="window.cursor.classList.add('hover')"
            onmouseout="window.cursor.classList.remove('hover')"
          ></a>
        </li>
        <li>
          <a
            href="#contact"
            data-i18n="nav.contact"
            onmouseover="window.cursor.classList.add('hover')"
            onmouseout="window.cursor.classList.remove('hover')"
          ></a>
        </li>
      </ul>
      <div class="nav-controls">
        <div class="language-switcher">
          <button class="ctrl-btn" id="lang-btn" title="Change language">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path
                d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
              />
            </svg>
            <span id="lang-label">EN</span>
          </button>
        </div>

        <div class="theme-switcher">
          <button class="ctrl-btn" id="theme-btn" title="Toggle theme">
            <svg
              id="theme-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section id="hero">
      <p class="hero-eyebrow-wrapper">
        <span class="hero-eyebrow" data-i18n="hero.eyebrow"> </span>
        <span class="hero-eyebrow-cursor"></span>
      </p>

      <h1 class="hero-title">
        <span data-i18n="hero.title1" id="hero-title1"></span>
        <span data-i18n="hero.title2" id="hero-title2"></span>
      </h1>
      <p class="hero-sub" data-i18n="hero.sub"></p>
      <div class="hero-ctas">
        <a href="#projects" class="btn-primary" data-i18n="hero.cta1"></a>
        <a href="#contact" class="btn-outline" data-i18n="hero.cta2"></a>
      </div>
      <div class="hero-scroll">
        <div class="scroll-line"></div>
        <span data-i18n="hero.scroll" id="hero-scroll">Scroll</span>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about">
      <p class="section-label" data-i18n="nav.about"></p>
      <div class="about-grid">
        <div class="about-text reveal">
          <h2 data-i18n="about.title"></h2>
          <p data-i18n="about.p1"></p>
          <p data-i18n="about.p2"></p>
        </div>
        <div class="about-stats reveal">
          <div class="stat">
            <div class="stat-num">X<span>+</span></div>
            <div class="stat-label" data-i18n="about.stat1"></div>
          </div>
          <div class="stat">
            <div class="stat-num">X<span>+</span></div>
            <div class="stat-label" data-i18n="about.stat2"></div>
          </div>
          <div class="stat">
            <div class="stat-num">X<span>+</span></div>
            <div class="stat-label" data-i18n="about.stat3"></div>
          </div>
          <div class="stat">
            <div class="stat-num">∞</div>
            <div class="stat-label" data-i18n="about.stat4"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- SKILLS -->
    <section id="skills">
      <!-- Section à refaire   -->
      <div class="todo">
        <p>Section Skills à refaire</p>
      </div>
    </section>

    <!-- PROJECTS -->
    <section id="projects">
      <div class="projects-header reveal">
        <div>
          <p class="section-label" data-i18n="nav.projects"></p>
          <h2 data-i18n="projects.title"></h2>
        </div>
        <a
          href="#"
          class="btn-outline"
          style="font-size: 13px"
          data-i18n="projects.all"
        ></a>
      </div>
      <div class="projects-grid">
        <!-- Featured -->
        <div class="project-card featured reveal">
          <div class="project-thumb">
            <div class="project-thumb-inner">01</div>
          </div>
          <div class="project-body">
            <div class="project-tags">
              <span class="tag">Next.js</span>
              <span class="tag">TypeScript</span>
              <span class="tag">Prisma</span>
              <span class="tag">Featured</span>
            </div>
            <h3 class="project-title" data-i18n="projects.p1.title"></h3>
            <p class="project-desc" data-i18n="projects.p1.desc"></p>
            <div class="project-links">
              <a href="#" class="project-link">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                  />
                  <polyline points="15 3 21 3 21 9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
                <span data-i18n="projects.live">Voir le site</span>
              </a>
              <a href="#" class="project-link">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                  />
                </svg>
              </a>
            </div>
          </div>
        </div>
        <!-- Card 2 -->
        <div class="project-card reveal">
          <div class="project-thumb">
            <div class="project-thumb-inner">02</div>
          </div>
          <div class="project-body">
            <div class="project-tags">
              <span class="tag">React</span>
              <span class="tag">Node.js</span>
            </div>
            <h3 class="project-title" data-i18n="projects.p2.title"></h3>
            <p class="project-desc" data-i18n="projects.p2.desc"></p>
            <div class="project-links">
              <a href="#" class="project-link">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                  />
                  <polyline points="15 3 21 3 21 9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
                <span data-i18n="projects.live"></span>
              </a>
            </div>
          </div>
        </div>
        <!-- Card 3 -->
        <div class="project-card reveal">
          <div class="project-thumb">
            <div class="project-thumb-inner">03</div>
          </div>
          <div class="project-body">
            <div class="project-tags">
              <span class="tag">Vue.js</span>
              <span class="tag">GraphQL</span>
            </div>
            <h3 class="project-title" data-i18n="projects.p3.title"></h3>
            <p class="project-desc" data-i18n="projects.p3.desc"></p>
            <div class="project-links">
              <a href="#" class="project-link">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"
                  />
                  <polyline points="15 3 21 3 21 9" />
                  <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
                <span data-i18n="projects.live">Voir le site</span>
              </a>
              <a href="#" class="project-link">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                  />
                </svg>
                GitHub
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
      <p class="contact-eyebrow" data-i18n="contact.eyebrow"></p>
      <h2 class="reveal" data-i18n="contact.title"></h2>
      <p class="reveal" data-i18n="contact.sub"></p>
      <a
        href="mailto:alex@dupont.dev"
        class="btn-primary reveal"
        style="display: inline-block; font-size: 16px; padding: 16px 40px"
        data-i18n="contact.cta"
      >
      </a>
      <div class="contact-social reveal">
        <a href="#" class="social-link">GitHub</a>
        <a href="#" class="social-link">LinkedIn</a>
        <a href="#" class="social-link">Twitter/X</a>
        <a href="#" class="social-link">Dribbble</a>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p class="footer">This is a footer.</p>
    </footer>
  </body>
</html>
